<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QuitTrack">
<meta name="theme-color" content="#0a0a1a">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22QuitTrack%22%2C%22short_name%22%3A%22QuitTrack%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a1a%22%2C%22theme_color%22%3A%22%230a0a1a%22%7D">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a1a' width='100' height='100' rx='20'/><text y='68' x='50' text-anchor='middle' font-size='55'>🚀</text></svg>">
<title>QuitTrack — Брось привычку</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a1a;
    --card: #12122a;
    --card-border: rgba(255,255,255,0.06);
    --text: #e8e8f0;
    --text-dim: #7a7a9a;
    --cyan: #00d4ff;
    --green: #00ff88;
    --amber: #ffaa00;
    --pink: #ff4488;
    --purple: #8b5cf6;
    --red: #ff4466;
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: calc(var(--safe-bottom) + 80px);
  }

  /* Header */
  .header {
    padding: 20px 20px 10px;
    text-align: center;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* Stats summary bar */
  .stats-bar {
    display: flex;
    gap: 10px;
    padding: 12px 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat-chip {
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(0,212,255,0.1));
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 16px;
    padding: 10px 16px;
    text-align: center;
    min-width: 100px;
  }
  .stat-chip .stat-val { font-size: 22px; font-weight: 800; color: var(--cyan); }
  .stat-chip .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* Motivational quote */
  .quote-bar {
    margin: 4px 20px 12px;
    padding: 12px 16px;
    background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(255,68,136,0.08));
    border-radius: 14px;
    border: 1px solid rgba(0,212,255,0.1);
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
    text-align: center;
    font-style: italic;
  }

  /* Habit cards */
  .habits-list {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .habit-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .habit-card:active { transform: scale(0.98); }

  .habit-card .glow {
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    filter: blur(50px);
    opacity: 0.15;
    pointer-events: none;
  }

  .habit-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .habit-info { display: flex; align-items: center; gap: 12px; }
  .habit-emoji {
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.05);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .habit-name { font-size: 17px; font-weight: 700; }
  .habit-since { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .habit-menu-btn {
    background: none; border: none; color: var(--text-dim);
    font-size: 20px; padding: 8px; cursor: pointer; border-radius: 10px;
  }
  .habit-menu-btn:hover { background: rgba(255,255,255,0.05); }

  /* Timer display */
  .timer-display {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }
  .timer-unit {
    text-align: center;
    min-width: 52px;
  }
  .timer-val {
    font-size: 32px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    background: linear-gradient(180deg, #fff, #aaa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .timer-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .timer-sep {
    font-size: 28px;
    font-weight: 300;
    color: rgba(255,255,255,0.15);
    align-self: flex-start;
    line-height: 1;
  }

  /* Milestone progress */
  .milestone-section { margin-top: 4px; }
  .milestone-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .milestone-label { font-size: 12px; color: var(--text-dim); }
  .milestone-target { font-size: 12px; font-weight: 600; }
  .progress-track {
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s linear;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0;
    width: 20px; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
    border-radius: 4px;
  }

  /* Achievement badges */
  .badges {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
    display: flex; align-items: center; gap: 4px;
  }
  .badge.earned {
    background: rgba(0,255,136,0.1);
    color: var(--green);
    border: 1px solid rgba(0,255,136,0.2);
  }
  .badge.next {
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* Reset streak button */
  .reset-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 12px;
    background: rgba(255,68,102,0.1);
    color: var(--red);
    border: 1px solid rgba(255,68,102,0.15);
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 24px);
    right: 20px;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    border: none;
    color: #fff;
    font-size: 32px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,212,255,0.3);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:active { transform: scale(0.9); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 40px;
    color: var(--text-dim);
  }
  .empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; }
  .empty-state h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }

  .modal {
    background: #1a1a2e;
    border-radius: 24px 24px 0 0;
    padding: 24px 20px calc(var(--safe-bottom) + 24px);
    width: 100%;
    max-width: 480px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .modal-overlay.active .modal { transform: translateY(0); }

  .modal h2 {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 20px;
    text-align: center;
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; display: block; font-weight: 500; }
  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 16px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--cyan); }

  .emoji-picker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .emoji-opt {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 2px solid transparent;
    font-size: 24px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .emoji-opt.selected {
    border-color: var(--cyan);
    background: rgba(0,212,255,0.1);
  }

  .color-picker { display: flex; gap: 10px; }
  .color-opt {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .color-opt.selected { border-color: #fff; transform: scale(1.15); }

  .btn-primary {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .btn-primary:active { opacity: 0.8; }
  .btn-primary:disabled { opacity: 0.4; }

  .btn-secondary {
    width: 100%;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    background: transparent;
    color: var(--text-dim);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-top: 8px;
  }

  /* Context menu */
  .ctx-menu {
    position: fixed;
    background: #222244;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 6px;
    z-index: 300;
    min-width: 180px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .ctx-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text);
    width: 100%;
    font-family: inherit;
  }
  .ctx-item:hover { background: rgba(255,255,255,0.06); }
  .ctx-item.danger { color: var(--red); }

  /* Celebration overlay */
  .celebration {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .celebration.active { opacity: 1; pointer-events: all; }
  .celebration .cel-emoji { font-size: 80px; animation: celBounce 0.6s ease; }
  .celebration .cel-title { font-size: 28px; font-weight: 900; margin: 16px 0 8px; text-align: center; }
  .celebration .cel-sub { font-size: 15px; color: var(--text-dim); text-align: center; max-width: 280px; line-height: 1.5; }
  .celebration .btn-primary { width: auto; padding: 14px 40px; margin-top: 24px; }

  @keyframes celBounce {
    0% { transform: scale(0); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    z-index: 501;
    pointer-events: none;
    border-radius: 2px;
    animation: confettiFall 2.5s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Shake animation for reset */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-4px); }
    40%, 80% { transform: translateX(4px); }
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// === Data layer ===
const STORAGE_KEY = 'quittrack_data';

const MILESTONES = [
  { label: '1 час', seconds: 3600, emoji: '⏰' },
  { label: '6 часов', seconds: 21600, emoji: '🌅' },
  { label: '12 часов', seconds: 43200, emoji: '☀️' },
  { label: '1 день', seconds: 86400, emoji: '🔥' },
  { label: '3 дня', seconds: 259200, emoji: '💪' },
  { label: '1 неделя', seconds: 604800, emoji: '⭐' },
  { label: '2 недели', seconds: 1209600, emoji: '🌟' },
  { label: '1 месяц', seconds: 2592000, emoji: '🏆' },
  { label: '2 месяца', seconds: 5184000, emoji: '👑' },
  { label: '3 месяца', seconds: 7776000, emoji: '💎' },
  { label: '6 месяцев', seconds: 15552000, emoji: '🎖️' },
  { label: '1 год', seconds: 31536000, emoji: '🏅' },
];

const QUOTES = [
  "Каждая секунда без привычки — это победа над собой",
  "Ты сильнее, чем думаешь. Доказательство — прямо перед тобой",
  "Сила воли — это мышца. И ты качаешь её прямо сейчас",
  "Лучшее время бросить было вчера. Второе лучшее — сегодня",
  "Не считай дни. Делай так, чтобы дни считались",
  "Ты уже дальше, чем вчера. Продолжай!",
  "Твоё будущее «я» скажет тебе спасибо",
  "Маленькие победы складываются в большие перемены",
  "Привычка — это цепь. Каждый день ты разбиваешь ещё одно звено",
  "Прогресс, а не совершенство",
  "Ты не просто бросаешь привычку — ты строишь новую жизнь",
  "Сегодня тяжело. Завтра станет легче. Послезавтра — ещё легче",
];

const HABIT_PRESETS = [
  { name: 'Курение', emoji: '🚬', color: '#ff4466' },
  { name: 'Алкоголь', emoji: '🍺', color: '#ffaa00' },
  { name: 'Соцсети', emoji: '📱', color: '#8b5cf6' },
  { name: 'Фастфуд', emoji: '🍔', color: '#ff8844' },
  { name: 'Сахар', emoji: '🍬', color: '#ff66aa' },
  { name: 'Кофеин', emoji: '☕', color: '#aa8866' },
  { name: 'Азартные игры', emoji: '🎰', color: '#ffcc00' },
  { name: 'Энергетики', emoji: '⚡', color: '#00dd66' },
];

const COLORS = ['#00d4ff', '#ff4466', '#00ff88', '#ffaa00', '#8b5cf6', '#ff66aa', '#ff8844', '#00dd66'];

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { habits: [] };
  } catch { return { habits: [] }; }
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function getElapsed(quitDate) {
  const diff = Math.max(0, (Date.now() - new Date(quitDate).getTime()) / 1000);
  const days = Math.floor(diff / 86400);
  const hours = Math.floor((diff % 86400) / 3600);
  const minutes = Math.floor((diff % 3600) / 60);
  const seconds = Math.floor(diff % 60);
  return { totalSeconds: diff, days, hours, minutes, seconds };
}

function getCurrentMilestone(totalSeconds) {
  let current = null, next = null;
  for (let i = 0; i < MILESTONES.length; i++) {
    if (totalSeconds >= MILESTONES[i].seconds) {
      current = MILESTONES[i];
    } else {
      next = MILESTONES[i];
      break;
    }
  }
  return { current, next };
}

function getMilestoneProgress(totalSeconds, next) {
  if (!next) return 100;
  // Find the previous milestone
  const idx = MILESTONES.indexOf(next);
  const prevSec = idx > 0 ? MILESTONES[idx - 1].seconds : 0;
  return Math.min(100, ((totalSeconds - prevSec) / (next.seconds - prevSec)) * 100);
}

function getEarnedBadges(totalSeconds) {
  return MILESTONES.filter(m => totalSeconds >= m.seconds);
}

function getQuote() {
  const today = new Date();
  const idx = (today.getFullYear() * 366 + today.getMonth() * 31 + today.getDate() + today.getHours()) % QUOTES.length;
  return QUOTES[idx];
}

function pad(n) { return String(n).padStart(2, '0'); }

// === Rendering ===
let data = loadData();
let activeModal = null; // 'add', 'edit', 'menu'
let editingId = null;
let menuHabitId = null;
let menuPos = { x: 0, y: 0 };
let celebrationData = null;
let checkedMilestones = {}; // track which milestones we've celebrated

// Form state
let formName = '';
let formEmoji = '🚬';
let formColor = '#ff4466';
let formDate = '';
let formTime = '';

function render() {
  const app = document.getElementById('app');
  const totalActive = data.habits.length;
  const longestStreak = data.habits.reduce((max, h) => {
    const e = getElapsed(h.quitDate);
    return Math.max(max, e.days);
  }, 0);

  let html = '';

  // Header
  html += `<div class="header">
    <h1>QuitTrack</h1>
    <div class="subtitle">Возьми контроль над своей жизнью</div>
  </div>`;

  if (totalActive > 0) {
    // Stats bar
    html += `<div class="stats-bar">
      <div class="stat-chip"><div class="stat-val">${totalActive}</div><div class="stat-label">Активных</div></div>
      <div class="stat-chip"><div class="stat-val">${longestStreak}</div><div class="stat-label">Макс. дней</div></div>
      <div class="stat-chip"><div class="stat-val">${getEarnedBadgesTotal()}</div><div class="stat-label">Достижений</div></div>
    </div>`;

    // Quote
    html += `<div class="quote-bar">«${getQuote()}»</div>`;

    // Habits
    html += `<div class="habits-list">`;
    data.habits.forEach(h => {
      const e = getElapsed(h.quitDate);
      const { current, next } = getCurrentMilestone(e.totalSeconds);
      const progress = getMilestoneProgress(e.totalSeconds, next);
      const earned = getEarnedBadges(e.totalSeconds);
      const color = h.color || '#00d4ff';

      html += `<div class="habit-card" data-id="${h.id}">
        <div class="glow" style="background:${color}"></div>
        <div class="habit-top">
          <div class="habit-info">
            <div class="habit-emoji">${h.emoji}</div>
            <div>
              <div class="habit-name">${h.name}</div>
              <div class="habit-since">с ${formatDate(h.quitDate)}</div>
            </div>
          </div>
          <button class="habit-menu-btn" onclick="openMenu(event, '${h.id}')">⋯</button>
        </div>
        <div class="timer-display" data-quit="${h.quitDate}">
          <div class="timer-unit"><div class="timer-val" data-field="days">${pad(e.days)}</div><div class="timer-label">дней</div></div>
          <div class="timer-sep">:</div>
          <div class="timer-unit"><div class="timer-val" data-field="hours">${pad(e.hours)}</div><div class="timer-label">часов</div></div>
          <div class="timer-sep">:</div>
          <div class="timer-unit"><div class="timer-val" data-field="minutes">${pad(e.minutes)}</div><div class="timer-label">минут</div></div>
          <div class="timer-sep">:</div>
          <div class="timer-unit"><div class="timer-val" data-field="seconds">${pad(e.seconds)}</div><div class="timer-label">секунд</div></div>
        </div>
        <div class="milestone-section">
          <div class="milestone-header">
            <span class="milestone-label">${current ? current.emoji + ' ' + current.label : '🎯 Старт'}</span>
            <span class="milestone-target" style="color:${color}">${next ? '→ ' + next.emoji + ' ' + next.label : '🏅 Все достигнуты!'}</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${progress}%;background:linear-gradient(90deg,${color},${color}dd)"></div>
          </div>
        </div>
        ${earned.length > 0 ? `<div class="badges">${earned.slice(-4).map(b => `<span class="badge earned">${b.emoji} ${b.label}</span>`).join('')}</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="empty-state">
      <div class="empty-icon">🚀</div>
      <h2>Начни свой путь</h2>
      <p>Добавь вредную привычку, которую хочешь бросить, и отслеживай свой прогресс в реальном времени</p>
    </div>`;
  }

  // FAB
  html += `<button class="fab" onclick="openAddModal()">+</button>`;

  // Add/Edit Modal
  if (activeModal === 'add' || activeModal === 'edit') {
    const isEdit = activeModal === 'edit';
    html += `<div class="modal-overlay active" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <h2>${isEdit ? 'Редактировать' : 'Бросить привычку'}</h2>

        ${!isEdit ? `<div class="form-group">
          <div class="form-label">Быстрый выбор</div>
          <div class="emoji-picker">
            ${HABIT_PRESETS.map(p => `<button class="emoji-opt" onclick="selectPreset('${p.name}','${p.emoji}','${p.color}')">${p.emoji}</button>`).join('')}
          </div>
        </div>` : ''}

        <div class="form-group">
          <div class="form-label">Название</div>
          <input class="form-input" id="f-name" placeholder="Например: Курение" value="${formName}" oninput="formName=this.value">
        </div>

        <div class="form-group">
          <div class="form-label">Цвет</div>
          <div class="color-picker">
            ${COLORS.map(c => `<div class="color-opt ${formColor === c ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('')}
          </div>
        </div>

        <div class="form-group">
          <div class="form-label">Дата (когда бросил/а)</div>
          <input class="form-input" id="f-date" type="date" value="${formDate}" oninput="formDate=this.value">
        </div>

        <div class="form-group">
          <div class="form-label">Время</div>
          <input class="form-input" id="f-time" type="time" value="${formTime}" oninput="formTime=this.value">
        </div>

        <button class="btn-primary" onclick="saveHabit()">${isEdit ? 'Сохранить' : 'Начать отсчёт!'}</button>
        <button class="btn-secondary" onclick="closeModal()">Отмена</button>
      </div>
    </div>`;
  }

  // Context menu
  if (activeModal === 'menu' && menuHabitId) {
    html += `<div style="position:fixed;inset:0;z-index:290;" onclick="closeModal()"></div>
    <div class="ctx-menu" style="top:${menuPos.y}px;right:20px;">
      <button class="ctx-item" onclick="resetStreak('${menuHabitId}')">🔄 Сбросить отсчёт</button>
      <button class="ctx-item" onclick="editHabit('${menuHabitId}')">✏️ Редактировать</button>
      <button class="ctx-item danger" onclick="deleteHabit('${menuHabitId}')">🗑️ Удалить</button>
    </div>`;
  }

  // Celebration
  if (celebrationData) {
    html += `<div class="celebration active" onclick="closeCelebration()">
      <div class="cel-emoji">${celebrationData.emoji}</div>
      <div class="cel-title" style="color:${celebrationData.color}">${celebrationData.title}</div>
      <div class="cel-sub">${celebrationData.subtitle}</div>
      <button class="btn-primary" onclick="closeCelebration()">Продолжить 💪</button>
    </div>`;
  }

  app.innerHTML = html;
}

function getEarnedBadgesTotal() {
  let total = 0;
  data.habits.forEach(h => {
    total += getEarnedBadges(getElapsed(h.quitDate).totalSeconds).length;
  });
  return total;
}

function formatDate(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
}

// === Actions ===
function openAddModal() {
  activeModal = 'add';
  editingId = null;
  formName = '';
  formEmoji = '🚬';
  formColor = '#ff4466';
  const now = new Date();
  formDate = now.toISOString().split('T')[0];
  formTime = pad(now.getHours()) + ':' + pad(now.getMinutes());
  render();
}

function selectPreset(name, emoji, color) {
  formName = name;
  formEmoji = emoji;
  formColor = color;
  document.getElementById('f-name').value = name;
  render();
}

function selectColor(c) {
  formColor = c;
  render();
}

function openMenu(event, id) {
  event.stopPropagation();
  menuHabitId = id;
  menuPos = { y: Math.min(event.clientY, window.innerHeight - 180) };
  activeModal = 'menu';
  render();
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  activeModal = null;
  editingId = null;
  menuHabitId = null;
  render();
}

function saveHabit() {
  const name = formName.trim();
  if (!name) return;

  const quitDate = new Date(formDate + 'T' + (formTime || '00:00')).toISOString();

  if (editingId) {
    const h = data.habits.find(x => x.id === editingId);
    if (h) {
      h.name = name;
      h.color = formColor;
      h.quitDate = quitDate;
    }
  } else {
    data.habits.push({
      id: 'h_' + Date.now(),
      name,
      emoji: formEmoji,
      color: formColor,
      quitDate,
      bestStreak: 0,
    });
  }

  saveData(data);
  activeModal = null;
  editingId = null;
  render();
}

function editHabit(id) {
  const h = data.habits.find(x => x.id === id);
  if (!h) return;
  activeModal = 'edit';
  editingId = id;
  formName = h.name;
  formEmoji = h.emoji;
  formColor = h.color;
  const d = new Date(h.quitDate);
  formDate = d.toISOString().split('T')[0];
  formTime = pad(d.getHours()) + ':' + pad(d.getMinutes());
  render();
}

function resetStreak(id) {
  if (!confirm('Сбросить отсчёт? Начнём заново с текущего момента.')) return;
  const h = data.habits.find(x => x.id === id);
  if (h) {
    const elapsed = getElapsed(h.quitDate);
    h.bestStreak = Math.max(h.bestStreak || 0, elapsed.days);
    h.quitDate = new Date().toISOString();
  }
  saveData(data);
  activeModal = null;
  render();
}

function deleteHabit(id) {
  if (!confirm('Удалить эту привычку?')) return;
  data.habits = data.habits.filter(x => x.id !== id);
  saveData(data);
  activeModal = null;
  render();
}

function closeCelebration() {
  celebrationData = null;
  render();
}

// === Confetti ===
function spawnConfetti() {
  const colors = ['#00d4ff', '#ff4466', '#00ff88', '#ffaa00', '#8b5cf6', '#ff66aa'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 0.8 + 's';
    el.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
    el.style.width = (5 + Math.random() * 6) + 'px';
    el.style.height = (5 + Math.random() * 6) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

// === Timer update loop ===
function updateTimers() {
  document.querySelectorAll('.timer-display').forEach(display => {
    const quit = display.dataset.quit;
    if (!quit) return;
    const e = getElapsed(quit);
    const fields = display.querySelectorAll('.timer-val');
    if (fields[0]) fields[0].textContent = pad(e.days);
    if (fields[1]) fields[1].textContent = pad(e.hours);
    if (fields[2]) fields[2].textContent = pad(e.minutes);
    if (fields[3]) fields[3].textContent = pad(e.seconds);
  });

  // Check for new milestones
  data.habits.forEach(h => {
    const e = getElapsed(h.quitDate);
    const key = h.id;
    if (!checkedMilestones[key]) checkedMilestones[key] = 0;

    const earned = getEarnedBadges(e.totalSeconds);
    if (earned.length > checkedMilestones[key]) {
      const newMilestone = earned[earned.length - 1];
      checkedMilestones[key] = earned.length;

      // Only celebrate if the milestone was just reached (within 3 seconds)
      const msDiff = e.totalSeconds - newMilestone.seconds;
      if (msDiff < 3 && !celebrationData) {
        celebrationData = {
          emoji: newMilestone.emoji,
          title: `${h.name}: ${newMilestone.label}!`,
          subtitle: `Ты достиг(ла) отметки "${newMilestone.label}" без ${h.name.toLowerCase()}. Так держать!`,
          color: h.color
        };
        spawnConfetti();
        render();
      }
    }
  });

  // Update progress bars
  data.habits.forEach(h => {
    const card = document.querySelector(`.habit-card[data-id="${h.id}"]`);
    if (!card) return;
    const e = getElapsed(h.quitDate);
    const { next } = getCurrentMilestone(e.totalSeconds);
    const progress = getMilestoneProgress(e.totalSeconds, next);
    const fill = card.querySelector('.progress-fill');
    if (fill) fill.style.width = progress + '%';
  });

  requestAnimationFrame(updateTimers);
}

// === Init ===
// Pre-populate checked milestones
data.habits.forEach(h => {
  const e = getElapsed(h.quitDate);
  checkedMilestones[h.id] = getEarnedBadges(e.totalSeconds).length;
});

render();
requestAnimationFrame(updateTimers);
</script>
</body>
</html>
